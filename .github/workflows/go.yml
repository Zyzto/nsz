name: Go

on:
  push:
    paths:
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/go.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Test
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev
          go test ./... -count=1
      - name: Build CLI
        run: go build -o /tmp/nsz ./cmd/nsz
      - name: Build GUI
        run: go build -o /tmp/nsz-gui ./cmd/nsz-gui
